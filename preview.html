<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placy Email Templates — Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #F5F0F0;
      color: #2B2B2B;
    }

    /* ---- Top bar ---- */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #FFFFFF;
      border-bottom: 1px solid #EADDDD;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .topbar-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 32px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #2B2B2B;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .logo span {
      font-size: 12px;
      font-weight: 400;
      color: #9B9B9B;
      margin-left: 8px;
      letter-spacing: 0;
    }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      gap: 4px;
    }

    .tab {
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #6B6B6B;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .tab:hover {
      color: #2B2B2B;
      background: #FBF6F6;
    }

    .tab.active {
      color: #2F6BFF;
      background: #EBF1FF;
      border-color: #C5D6FF;
      font-weight: 600;
    }

    /* ---- Device toggle ---- */
    .device-toggle {
      margin-left: auto;
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .device-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      color: #6B6B6B;
      font-size: 16px;
      transition: all 0.15s ease;
    }

    .device-btn:hover {
      background: #FBF6F6;
      color: #2B2B2B;
    }

    .device-btn.active {
      background: #EBF1FF;
      border-color: #C5D6FF;
      color: #2F6BFF;
    }

    /* ---- Preview area ---- */
    .preview-area {
      padding-top: 80px;
      padding-bottom: 40px;
      display: flex;
      justify-content: center;
    }

    .preview-frame-wrapper {
      transition: width 0.3s ease;
      background: #FFFFFF;
      border: 1px solid #EADDDD;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .preview-frame-wrapper.desktop {
      width: 660px;
    }

    .preview-frame-wrapper.mobile {
      width: 375px;
    }

    .frame-label {
      padding: 10px 16px;
      font-size: 12px;
      color: #9B9B9B;
      border-bottom: 1px solid #F0EAEA;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .frame-label .dims {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
      color: #C0C0C0;
    }

    iframe {
      width: 100%;
      border: none;
      background: #FBF6F6;
    }

    /* ---- Responsive ---- */
    @media (max-width: 700px) {
      .topbar-inner {
        flex-wrap: wrap;
        height: auto;
        padding: 12px 16px;
        gap: 8px;
      }
      .tabs {
        order: 3;
        width: 100%;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .tab { font-size: 13px; padding: 6px 14px; }
      .preview-area { padding-top: 120px; }
      .preview-frame-wrapper.desktop { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">Placy <span>Email Preview</span></div>
      <nav class="tabs">
        <button class="tab active" data-template="value-report-weekly.html">Weekly Report</button>
        <button class="tab" data-template="value-report-monthly.html">Monthly Report</button>
        <button class="tab" data-template="product-updates.html">Product Updates</button>
      </nav>
      <div class="device-toggle">
        <button class="device-btn active" data-device="desktop" title="Desktop view">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
        <button class="device-btn" data-device="mobile" title="Mobile view">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Preview -->
  <main class="preview-area">
    <div class="preview-frame-wrapper desktop" id="frameWrapper">
      <div class="frame-label">
        <span id="templateName">Weekly Report</span>
        <span class="dims" id="frameDims">660px</span>
      </div>
      <iframe id="previewFrame" src="value-report-weekly.html"></iframe>
    </div>
  </main>

  <script>
    const frame = document.getElementById('previewFrame');
    const wrapper = document.getElementById('frameWrapper');
    const templateName = document.getElementById('templateName');
    const frameDims = document.getElementById('frameDims');
    const tabs = document.querySelectorAll('.tab');
    const deviceBtns = document.querySelectorAll('.device-btn');

    let currentDevice = 'desktop';

    // Auto-resize iframe height to match content
    function resizeFrame() {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        frame.style.height = doc.documentElement.scrollHeight + 'px';
      } catch (e) {
        frame.style.height = '2000px';
      }
    }

    frame.addEventListener('load', function () {
      resizeFrame();
      // Also resize after images/fonts load
      setTimeout(resizeFrame, 300);
      setTimeout(resizeFrame, 1000);
    });

    // Tab switching
    tabs.forEach(function (tab) {
      tab.addEventListener('click', function () {
        tabs.forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        var src = tab.getAttribute('data-template');
        frame.src = src;
        templateName.textContent = tab.textContent;
      });
    });

    // Device switching
    deviceBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        deviceBtns.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentDevice = btn.getAttribute('data-device');

        wrapper.classList.remove('desktop', 'mobile');
        wrapper.classList.add(currentDevice);

        frameDims.textContent = currentDevice === 'desktop' ? '660px' : '375px';

        // Re-trigger resize after transition
        setTimeout(resizeFrame, 350);
      });
    });
  </script>

</body>
</html>
